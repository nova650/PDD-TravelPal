name: TravelPal Unified CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  checkout-and-setup:
    name: Checkout and Setup Environment
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      - name: Print Versions
        run: |
          echo "Python version:"
          python --version
          echo "Node version:"
          node --version
          echo "Curl version:"
          curl --version

  verify-deployment:
    name: Verify Deployment
    runs-on: ubuntu-latest
    needs: checkout-and-setup
    steps:
      - name: Verify Vercel URL Status
        run: |
          STATUS_CODE=$(curl -s -o /dev/null -w "%{http_code}" https://travelpad.vercel.app)
          echo "Received status code: $STATUS_CODE"
          if [ "$STATUS_CODE" -ne 200 ]; then
            echo "Deployment status is not 200!"
            exit 1
          fi

  backend-tests:
    name: Running Backend Verification Suite
    runs-on: ubuntu-latest
    needs: verify-deployment
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install openpyxl

      - name: Run Backend Tests
        run: |
          python app/scripts/run_backend_tests.py

      - name: Upload Backend Security Report
        uses: actions/upload-artifact@v4
        with:
          name: Backend-Security-Report
          path: Vulnerability Test Results/Back-end/security_report.xlsx

  selenium-tests:
    name: Running Selenium E2E Tests
    runs-on: ubuntu-latest
    needs: backend-tests
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install openpyxl

      - name: Run Selenium Auth Tests
        run: |
          python app/scripts/run_frontend_tests.py

      - name: Upload Frontend E2E Report
        uses: actions/upload-artifact@v4
        with:
          name: Frontend-E2E-Report
          path: Vulnerability Test Results/Front-end/E2E_Test_Report_TravelPal_2026-06-11T11-50-43.xlsx

  mobile-tests:
    name: Running Mobile App E2E Tests
    runs-on: ubuntu-latest
    needs: selenium-tests
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install openpyxl

      - name: Run Mobile App Tests
        run: |
          python app/scripts/run_travelpal_tests.py

      - name: Upload Mobile App E2E Report
        uses: actions/upload-artifact@v4
        with:
          name: Mobile-App-E2E-Report
          path: Vulnerability Test Results/App/E2E_Appium_Report_TravelPal_2026-06-12T12-21-58.xlsx

  load-tests:
    name: Running Website Load Tests
    runs-on: ubuntu-latest
    needs: mobile-tests
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install openpyxl

      - name: Run Website Load Tests
        run: |
          python app/scripts/run_load_tests.py

      - name: Upload Website Load Test Report
        uses: actions/upload-artifact@v4
        with:
          name: Website-Load-Test-Report
          path: Vulnerability Test Results/Front-end/Load-Test-Report.xlsx

  verify-all-tests:
    name: Publish Unified Verification Report
    runs-on: ubuntu-latest
    needs: load-tests
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install openpyxl

      - name: Run Unified Verification Suite
        run: |
          python app/scripts/run_all_tests.py

      - name: Upload Unified Markdown Report
        uses: actions/upload-artifact@v4
        with:
          name: TravelPal-Unified-Report
          path: travelpal_test_report.md
