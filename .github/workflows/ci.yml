name: TravelPal Unified CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  checkout-and-setup:
    name: Checkout and Setup Environment
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      - name: Print Versions
        run: |
          echo "Python version:"
          python --version
          echo "Node version:"
          node --version
          echo "Curl version:"
          curl --version

  verify-deployment:
    name: Verify Deployment
    runs-on: ubuntu-latest
    needs: checkout-and-setup
    steps:
      - name: Verify Vercel URL Status
        run: |
          STATUS_CODE=$(curl -s -o /dev/null -w "%{http_code}" https://travelpad.vercel.app)
          echo "Received status code: $STATUS_CODE"
          if [ "$STATUS_CODE" -ne 200 ]; then
            echo "Deployment status is not 200!"
            exit 1
          fi

  backend-tests:
    name: Running Backend Verification Suite
    runs-on: ubuntu-latest
    needs: verify-deployment
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install openpyxl

      - name: Run Backend Tests
        run: |
          python scripts/run_backend_tests.py

  selenium-tests:
    name: Running Selenium E2E Tests
    runs-on: ubuntu-latest
    needs: backend-tests
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r webapp/requirements.txt

      - name: Run Selenium Auth Tests
        run: |
          python webapp/selenium_auth_tests.py

  verify-all-tests:
    name: Publish Unified Verification Report
    runs-on: ubuntu-latest
    needs: selenium-tests
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install openpyxl

      - name: Run Unified Verification Suite
        run: |
          python scripts/run_all_tests.py
